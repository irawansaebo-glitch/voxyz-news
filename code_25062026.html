<!DOCTYPE html>
<html lang="id-ID">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOXYZ NEWS - Breaking News Terkini & Terpercaya</title>
    <meta name="description" content="Berita cepat, akurat, dan berimbang. Sumber berita terkini Indonesia dan dunia.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        voxy: { red: '#E62129', dark: '#111827', gray: '#F8FAFC', text: '#1E293B' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .breaking-scroll { animation: scroll 22s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
        .isi-berita p { margin: 1.2rem 0; line-height: 1.8; font-size: 1.05rem; color: #333; text-align: justify; }
        .halaman { display: none; }
        .halaman.aktif { display: block; }
        .update-indikator { font-size: 11px; color: #E62129; font-weight: bold; margin-left: 8px; }
    </style>
</head>
<body class="bg-voxy-gray text-voxy-text">

<!-- Header -->
<header class="bg-white shadow sticky top-0 z-50">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <a href="#" onclick="tampilkanHalaman('beranda')" class="text-2xl md:text-3xl font-black text-voxy-red">VOXYZ<span class="text-voxy-dark">NEWS</span></a>
        <div class="text-xs text-gray-500">Update otomatis <span id="waktuUpdate" class="update-indikator"></span></div>
    </div>

    <!-- Breaking News Berjalan -->
    <div class="bg-voxy-red text-white py-2 overflow-hidden">
        <div class="container mx-auto flex items-center gap-3">
            <span class="bg-white text-voxy-red font-bold px-2 py-0.5 text-xs">LIVE</span>
            <div id="breakingNews" class="whitespace-nowrap breaking-scroll text-sm">Memuat berita terbaru...</div>
        </div>
    </div>
</header>

<!-- Halaman Beranda -->
<div id="halaman-beranda" class="halaman aktif">
    <main class="container mx-auto px-4 py-6">
        <div class="grid lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-8">
                <section><h2 class="text-xl font-bold border-l-4 border-voxy-red pl-3 mb-4">BERITA UTAMA</h2><div id="beritaUtama"></div></section>
                <section><h2 class="text-xl font-bold border-l-4 border-voxy-red pl-3 mb-4">BERITA TERBARU</h2><div id="daftarBerita" class="space-y-5"></div></section>
            </div>
            <aside class="space-y-6">
                <div class="bg-white p-4 rounded shadow"><h3 class="font-bold text-lg border-b pb-2 mb-3">PALING POPULER</h3><ol id="beritaPopuler" class="space-y-3 list-decimal pl-5"></ol></div>
            </aside>
        </div>
    </main>
</div>

<!-- Halaman Detail -->
<div id="halaman-detail" class="halaman">
    <main class="container mx-auto px-4 py-8 max-w-3xl">
        <div id="kontenBerita" class="bg-white p-5 md:p-8 rounded shadow-md"></div>
    </main>
</div>

<footer class="bg-voxy-dark text-gray-300 py-6 mt-8 text-center text-sm">© 2026 VOXYZ NEWS | Real-Time Breaking News</footer>

<!-- SISTEM AMBIL BERITA OTOMATIS DARI SUMBER LUAR -->
<script>
let semuaBerita = [];

// 🚀 Ambil berita TERBARU secara otomatis dari sumber publik
async function ambilBeritaOtomatis() {
    try {
        // Mengambil berita dari API publik (gratis & sah untuk keperluan percobaan)
        const res = await fetch('https://api-berita-indonesia.vercel.app/antara/terbaru/');
        const data = await res.json();
        
        // Olah data agar sesuai format situs kita
        semuaBerita = data.data.posts.map((item, index) => ({
            id: index + 1,
            kategori: "Nasional",
            judul: item.title,
            ringkasan: item.description.substring(0, 120) + "...",
            gambar: item.thumbnail || "https://picsum.photos/id/1065/1200/700",
            penulis: "Redaksi VOXYZ",
            waktu: new Date(item.pubDate).toLocaleString('id-ID'),
            isi: `<p>${item.description}</p><p>Baca selengkapnya di sumber asli: <a href="${item.link}" target="_blank" class="text-voxy-red">Klik di sini</a></p>`
        }));

        tampilkanSemuaBerita();
    } catch (error) {
        console.log("Gagal memuat berita, menunggu percobaan ulang...", error);
        document.getElementById('breakingNews').textContent = "Memuat berita terbaru...";
    }
}

// Tampilkan ke halaman
function tampilkanSemuaBerita() {
    if (semuaBerita.length === 0) return;

    const utama = semuaBerita[0];
    document.getElementById('beritaUtama').innerHTML = `
        <a href="#" onclick="bukaBerita(${utama.id})" class="block bg-white rounded shadow overflow-hidden hover:shadow-lg transition-shadow">
            <img src="${utama.gambar}" alt="${utama.judul}" class="w-full h-72 object-cover">
            <div class="p-5">
                <span class="text-xs text-voxy-red font-semibold">${utama.kategori} • ${utama.waktu}</span>
                <h3 class="text-2xl font-bold my-3 hover:text-voxy-red">${utama.judul}</h3>
                <p class="text-gray-600 line-clamp-2">${utama.ringkasan}</p>
            </div>
        </a>`;

    document.getElementById('daftarBerita').innerHTML = semuaBerita.slice(1,7).map(b => `
        <a href="#" onclick="bukaBerita(${b.id})" class="flex gap-3 bg-white rounded shadow-sm p-3 hover:shadow-md transition-shadow">
            <img src="${b.gambar}" class="w-28 h-20 object-cover rounded" alt="${b.judul}">
            <div class="flex-1">
                <span class="text-xs text-voxy-red">${b.kategori}</span>
                <h4 class="font-semibold line-clamp-2 hover:text-voxy-red">${b.judul}</h4>
                <p class="text-xs text-gray-500 mt-1">${b.waktu}</p>
            </div>
        </a>`).join('');

    document.getElementById('breakingNews').textContent = semuaBerita.map(b => `${b.judul} • `).join('');
    document.getElementById('beritaPopuler').innerHTML = semuaBerita.slice(0,5).map(b => `<li><a href="#" onclick="bukaBerita(${b.id})" class="text-sm hover:text-voxy-red">${b.judul}</a></li>`).join('');
    document.getElementById('waktuUpdate').textContent = new Date().toLocaleTimeString('id-ID');
}

function bukaBerita(id) {
    const artikel = semuaBerita.find(b => b.id === id);
    if(!artikel) return;
    document.getElementById('kontenBerita').innerHTML = `
        <span class="text-sm text-voxy-red font-semibold">${artikel.kategori}</span>
        <h1 class="text-3xl md:text-4xl font-bold my-4 text-gray-900">${artikel.judul}</h1>
        <div class="flex items-center text-sm text-gray-500 gap-3 mb-6">
            <span>Oleh: ${artikel.penulis}</span>
            <span>•</span>
            <span>${artikel.waktu}</span>
        </div>
        <img src="${artikel.gambar}" alt="${artikel.judul}" class="w-full h-auto rounded mb-6">
        <div class="isi-berita">${artikel.isi}</div>
        <div class="border-t mt-8 pt-4 flex gap-4 text-xl">
            <span class="text-gray-600">Bagikan:</span>
            <a href="#" class="text-blue-600 hover:text-blue-800"><i class="fa fa-facebook"></i></a>
            <a href="#" class="text-sky-500 hover:text-sky-700"><i class="fa fa-twitter"></i></a>
            <a href="#" class="text-green-600 hover:text-green-800"><i class="fa fa-whatsapp"></i></a>
        </div>
        <div class="mt-6">
            <button onclick="tampilkanHalaman('beranda')" class="text-voxy-red font-medium">← Kembali ke Beranda</button>
        </div>`;
    tampilkanHalaman('detail');
}

function tampilkanHalaman(nama) {
    document.querySelectorAll('.halaman').forEach(el => el.classList.remove('aktif'));
    document.getElementById('halaman-'+nama).classList.add('aktif');
}

// ⚡ JALANKAN SISTEM OTOMATIS
ambilBeritaOtomatis();
setInterval(ambilBeritaOtomatis, 60000); // Cek & update berita baru setiap 1 menit
</script>
</body>
</html>
