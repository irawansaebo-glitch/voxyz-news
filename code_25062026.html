<!DOCTYPE html>
<html lang="id-ID">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOXYZ NEWS - Terkini & Otomatis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        voxy: { red: '#E62129', dark: '#111827', gray: '#F8FAFC' }
                    }
                }
            }
        }
    </script>
    <style>
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .breaking-scroll { animation: scroll 25s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
        .halaman { display: none; }
        .halaman.aktif { display: block; }
        .isi-berita p { margin: 1rem 0; line-height: 1.7; text-align: justify; }
    </style>
</head>
<body class="bg-voxy-gray text-gray-800">

<!-- Header -->
<header class="bg-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <a href="#" onclick="tampilkan('beranda')" class="text-2xl font-black text-voxy-red">VOXYZ<span class="text-gray-900">NEWS</span></a>
        <div class="flex gap-4">
            <i class="fa fa-search text-lg"></i>
            <i class="fa fa-bars text-lg"></i>
        </div>
    </div>
    <div class="bg-voxy-red text-white py-2 overflow-hidden">
        <div class="container mx-auto flex items-center gap-2">
            <span class="bg-white text-voxy-red font-bold px-2 py-0.5 text-xs">LIVE</span>
            <div id="beritaJalan" class="whitespace-nowrap breaking-scroll text-sm">Memuat berita terbaru...</div>
        </div>
    </div>
</header>

<!-- Halaman Beranda -->
<div id="halaman-beranda" class="halaman aktif">
    <main class="container mx-auto px-4 py-5">
        <h2 class="text-xl font-bold border-l-4 border-voxy-red pl-3 mb-4">BERITA UTAMA</h2>
        <div id="beritaUtama" class="mb-8"></div>

        <h2 class="text-xl font-bold border-l-4 border-voxy-red pl-3 mb-4">BERITA TERBARU</h2>
        <div id="daftarBerita" class="space-y-4"></div>
    </main>
</div>

<!-- Halaman Detail -->
<div id="halaman-detail" class="halaman">
    <main class="container mx-auto px-4 py-5 max-w-2xl">
        <div id="kontenDetail" class="bg-white p-5 rounded shadow-md"></div>
    </main>
</div>

<footer class="bg-gray-900 text-gray-300 text-center py-4 mt-6 text-sm">
    © 2026 VOXYZ NEWS • Update otomatis setiap 1 menit
</footer>

<script>
let daftar = [];

// ✅ Ambil berita OTOMATIS dari ANTARA News
async function ambilBerita() {
    try {
        const res = await fetch('https://api-berita-indonesia.vercel.app/antara/terbaru/');
        const hasil = await res.json();
        daftar = hasil.data.posts.map((item, i) => ({
            id: i+1,
            kategori: "Nasional",
            judul: item.title,
            ringkasan: item.description.substring(0, 120) + "...",
            gambar: item.thumbnail || "https://picsum.photos/id/1065/800/500",
            waktu: new Date(item.pubDate).toLocaleString('id-ID'),
            isi: `<p>${item.description}</p><p><a href="${item.link}" target="_blank" class="text-voxy-red font-medium">Baca sumber lengkap</a></p>`
        }));
        tampilkanBerita();
    } catch (err) {
        console.log("Gagal ambil berita:", err);
        document.getElementById('beritaJalan').textContent = "Tunggu sebentar, memuat ulang...";
    }
}

function tampilkanBerita() {
    if (daftar.length === 0) return;

    // Berita Utama
    const utama = daftar[0];
    document.getElementById('beritaUtama').innerHTML = `
        <a href="#" onclick="buka(${utama.id})" class="block bg-white rounded shadow overflow-hidden">
            <img src="${utama.gambar}" class="w-full h-64 object-cover" alt="${utama.judul}">
            <div class="p-4">
                <span class="text-sm text-voxy-red font-semibold">${utama.kategori} • ${utama.waktu}</span>
                <h3 class="text-xl font-bold my-2">${utama.judul}</h3>
                <p class="text-gray-600 line-clamp-2">${utama.ringkasan}</p>
            </div>
        </a>
    `;

    // Daftar Berita
    document.getElementById('daftarBerita').innerHTML = daftar.slice(1,8).map(b => `
        <a href="#" onclick="buka(${b.id})" class="flex gap-3 bg-white p-3 rounded shadow-sm">
            <img src="${b.gambar}" class="w-24 h-20 object-cover rounded" alt="${b.judul}">
            <div>
                <span class="text-xs text-voxy-red">${b.kategori}</span>
                <h4 class="font-semibold line-clamp-2">${b.judul}</h4>
                <p class="text-xs text-gray-500">${b.waktu}</p>
            </div>
        </a>
    `).join('');

    // Berita berjalan
    document.getElementById('beritaJalan').textContent = daftar.map(b => `${b.judul} • `).join('');
}

function buka(id) {
    const b = daftar.find(x => x.id === id);
    document.getElementById('kontenDetail').innerHTML = `
        <span class="text-sm text-voxy-red font-semibold">${b.kategori}</span>
        <h1 class="text-2xl font-bold my-3">${b.judul}</h1>
        <p class="text-sm text-gray-500 mb-4">${b.waktu}</p>
        <img src="${b.gambar}" class="w-full h-auto rounded mb-4" alt="${b.judul}">
        <div class="isi-berita">${b.isi}</div>
        <button onclick="tampilkan('beranda')" class="mt-5 text-voxy-red font-medium">← Kembali ke Beranda</button>
    `;
    tampilkan('detail');
}

function tampilkan(nama) {
    document.querySelectorAll('.halaman').forEach(el => el.classList.remove('aktif'));
    document.getElementById('halaman-'+nama).classList.add('aktif');
}

// ⚡ JALANKAN OTOMATIS
ambilBerita();
setInterval(ambilBerita, 60000); // Update setiap 1 menit
</script>

</body>
</html>
