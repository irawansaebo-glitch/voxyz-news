<!DOCTYPE html>
<html lang="id-ID">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOXYZ NEWS - Terkini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { voxy: { red: '#E62129', dark: '#111827' } } } } }
    </script>
    <style>
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .breaking-scroll { animation: scroll 25s linear infinite; white-space: nowrap; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
        .halaman { display: none; }
        .halaman.aktif { display: block; }
        .isi-berita p { margin: 1rem 0; line-height: 1.7; text-align: justify; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

<header class="bg-white shadow sticky top-0 z-50">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <a href="#" onclick="tampilkan('beranda')" class="text-2xl font-black text-voxy-red">VOXYZ<span class="text-gray-900">NEWS</span></a>
        <div class="flex gap-3">
            <i class="fa fa-search text-lg"></i>
            <i class="fa fa-bars text-lg"></i>
        </div>
    </div>
    <div class="bg-voxy-red text-white py-2 overflow-hidden">
        <div class="container mx-auto flex items-center gap-2">
            <span class="bg-white text-voxy-red font-bold px-2 py-0.5 text-xs rounded">LIVE</span>
            <div id="infoStatus" class="breaking-scroll text-sm">Memuat berita terbaru...</div>
        </div>
    </div>
</header>

<div id="halaman-beranda" class="halaman aktif">
    <main class="container mx-auto px-4 py-5">
        <h2 class="text-xl font-bold border-l-4 border-voxy-red pl-3 mb-4">BERITA UTAMA</h2>
        <div id="beritaUtama" class="mb-6 bg-white rounded shadow overflow-hidden"></div>

        <h2 class="text-xl font-bold border-l-4 border-voxy-red pl-3 mb-4">BERITA TERBARU</h2>
        <div id="daftarBerita" class="space-y-4"></div>
    </main>
</div>

<div id="halaman-detail" class="halaman">
    <main class="container mx-auto px-4 py-5 max-w-2xl">
        <div id="kontenDetail" class="bg-white p-4 rounded shadow"></div>
        <button onclick="tampilkan('beranda')" class="mt-4 text-voxy-red font-medium">← Kembali</button>
    </main>
</div>

<footer class="bg-gray-900 text-gray-300 text-center py-4 mt-6 text-sm">
    © 2026 VOXYZ NEWS | Update otomatis setiap 1 menit
</footer>

<script>
// ✅ Data berita OTOMATIS + cadangan aman
let daftarBerita = [];

async function ambilBerita() {
    try {
        // Gunakan layanan perantara yang aman untuk HP
        const res = await fetch("https://api.allorigins.win/raw?url=https://api-berita-indonesia.vercel.app/antara/terbaru/");
        const data = await res.json();
        
        daftarBerita = data.data.posts.map((item, i) => ({
            id: i+1,
            kategori: "Nasional",
            judul: item.title,
            ringkasan: item.description?.substring(0, 130) + "..." || "Baca selengkapnya",
            gambar: item.thumbnail || "https://picsum.photos/id/1065/800/500",
            waktu: new Date(item.pubDate).toLocaleString("id-ID"),
            isi: `<p>${item.description || ''}</p><p><a href="${item.link}" target="_blank" class="text-voxy-red">Baca sumber asli</a></p>`
        }));

        tampilkan();
        document.getElementById("infoStatus").textContent = "Berita terbaru siap | " + daftarBerita.map(x => x.judul).join(" • ");
    } catch (err) {
        console.log("Gagal ambil:", err);
        // Jika gagal, tampilkan data cadangan agar tidak kosong
        if (daftarBerita.length === 0) {
            daftarBerita = [
                {
                    id: 1,
                    kategori: "Info",
                    judul: "Sistem siap digunakan",
                    ringkasan: "Berita akan otomatis muncul dan diperbarui setiap 1 menit setelah terhubung ke internet.",
                    gambar: "https://picsum.photos/id/1065/800/500",
                    waktu: new Date().toLocaleString("id-ID"),
                    isi: "<p>Pastikan koneksi internet aktif, lalu tarik layar ke bawah untuk memuat ulang.</p>"
                }
            ];
            tampilkan();
            document.getElementById("infoStatus").textContent = "Sedang mencoba memuat ulang...";
        }
    }
}

function tampilkan() {
    if (!daftarBerita.length) return;

    const utama = daftarBerita[0];
    document.getElementById("beritaUtama").innerHTML = `
        <a href="#" onclick="buka(${utama.id})">
            <img src="${utama.gambar}" class="w-full h-52 object-cover" alt="${utama.judul}">
            <div class="p-4">
                <span class="text-sm text-voxy-red font-semibold">${utama.kategori} • ${utama.waktu}</span>
                <h3 class="text-xl font-bold my-2">${utama.judul}</h3>
                <p class="text-gray-600 line-clamp-2">${utama.ringkasan}</p>
            </div>
        </a>`;

    document.getElementById("daftarBerita").innerHTML = daftarBerita.slice(1, 8).map(b => `
        <a href="#" onclick="buka(${b.id})" class="flex gap-3 bg-white p-3 rounded shadow-sm">
            <img src="${b.gambar}" class="w-24 h-20 object-cover rounded" alt="${b.judul}">
            <div>
                <span class="text-xs text-voxy-red">${b.kategori}</span>
                <h4 class="font-semibold line-clamp-2 my-1">${b.judul}</h4>
                <p class="text-xs text-gray-500">${b.waktu}</p>
            </div>
        </a>`).join("");
}

function buka(id) {
    const artikel = daftarBerita.find(x => x.id === id);
    document.getElementById("kontenDetail").innerHTML = `
        <span class="text-sm text-voxy-red font-semibold">${artikel.kategori}</span>
        <h1 class="text-2xl font-bold my-3">${artikel.judul}</h1>
        <p class="text-sm text-gray-500 mb-4">${artikel.waktu}</p>
        <img src="${artikel.gambar}" class="w-full h-auto rounded mb-4" alt="${artikel.judul}">
        <div class="isi-berita">${artikel.isi}</div>`;
    tampilkan("detail");
}

function tampilkan(nama) {
    document.querySelectorAll(".halaman").forEach(el => el.classList.remove("aktif"));
    document.getElementById("halaman-" + nama).classList.add("aktif");
    window.scrollTo(0, 0);
}

// Jalankan otomatis
ambilBerita();
setInterval(ambilBerita, 60000);
</script>

</body>
</html>
