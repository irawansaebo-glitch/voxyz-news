<!DOCTYPE html>
<html lang="id-ID">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOXYZ NEWS - Terkini & Otomatis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        voxy: { red: '#E62129', dark: '#111827', gray: '#F8FAFC' }
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .breaking-scroll { animation: scroll 25s linear infinite; white-space: nowrap; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
        .halaman { display: none; }
        .halaman.aktif { display: block; }
        .isi-berita p { margin: 1rem 0; line-height: 1.7; text-align: justify; }
    </style>
</head>
<body class="bg-voxy-gray text-gray-800">

<!-- Header -->
<header class="bg-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <a href="#" onclick="tampilkan('beranda')" class="text-2xl font-black text-voxy-red">VOXYZ<span class="text-gray-900">NEWS</span></a>
        <div class="text-xs text-gray-500">Update otomatis <span id="waktuSekarang"></span></div>
    </div>
    <div class="bg-voxy-red text-white py-2 overflow-hidden">
        <div class="container mx-auto flex items-center gap-2">
            <span class="bg-white text-voxy-red font-bold px-2 py-0.5 text-xs rounded">LIVE</span>
            <div id="beritaJalan" class="breaking-scroll text-sm"></div>
        </div>
    </div>
</header>

<!-- Halaman Beranda -->
<div id="halaman-beranda" class="halaman aktif">
    <main class="container mx-auto px-4 py-5">
        <h2 class="text-xl font-bold border-l-4 border-voxy-red pl-3 mb-4">BERITA UTAMA</h2>
        <div id="beritaUtama" class="mb-8 bg-white rounded shadow-sm overflow-hidden"></div>

        <h2 class="text-xl font-bold border-l-4 border-voxy-red pl-3 mb-4">BERITA TERBARU</h2>
        <div id="daftarBerita" class="space-y-4"></div>
    </main>
</div>

<!-- Halaman Detail -->
<div id="halaman-detail" class="halaman">
    <main class="container mx-auto px-4 py-5 max-w-2xl">
        <div id="kontenDetail" class="bg-white p-5 rounded shadow-md"></div>
        <button onclick="tampilkan('beranda')" class="mt-5 text-voxy-red font-medium">← Kembali ke Beranda</button>
    </main>
</div>

<footer class="bg-gray-900 text-gray-300 text-center py-4 mt-6 text-sm">
    © 2026 VOXYZ NEWS • Update otomatis setiap 1 menit
</footer>

<script>
// 📋 DAFTAR BERITA SIAP PAKAI
// Sistem akan otomatis berganti berita dari daftar ini
let daftarBerita = [
    {
        id: 1,
        kategori: "Nasional",
        judul: "Pemerintah Luncurkan Program Kesejahteraan Merata",
        ringkasan: "Program ini menyasar pembangunan infrastruktur, kesehatan, dan pendidikan hingga ke daerah terpencil.",
        gambar: "https://picsum.photos/id/1065/800/500",
        penulis: "Tim Redaksi",
        waktu: "25 Juni 2026 • 08.30 WIB",
        isi: `<p>JAKARTA – Pemerintah secara resmi meluncurkan program peningkatan kesejahteraan masyarakat yang mencakup seluruh wilayah Indonesia, termasuk daerah perbatasan dan kepulauan kecil.</p>
        <p>Menteri Koordinator Pembangunan Manusia menyatakan anggaran sebesar Rp45 triliun telah disiapkan untuk tahun pertama pelaksanaan program ini.</p>
        <p>“Tujuannya agar hasil pembangunan benar-benar dirasakan secara adil oleh seluruh warga negara tanpa memandang tempat tinggal,” ujarnya dalam konferensi pers.</p>`
    },
    {
        id: 2,
        kategori: "Ekonomi",
        judul: "Harga Kebutuhan Pokok Diprediksi Stabil",
        ringkasan: "Badan Pangan Nasional memastikan ketersediaan stok aman dan cukup hingga akhir tahun.",
        gambar: "https://picsum.photos/id/1080/800/500",
        penulis: "Redaksi Ekonomi",
        waktu: "25 Juni 2026 • 09.15 WIB",
        isi: `<p>JAKARTA – Harga beras, gula, minyak goreng, dan bahan pokok lainnya diprediksi tidak akan mengalami kenaikan signifikan hingga akhir tahun 2026.</p>
        <p>Kepala Badan Pangan Nasional menyatakan stok pangan nasional mencapai 6 bulan kebutuhan, sehingga aman dari risiko kelangkaan.</p>
        <p>Distribusi juga dipercepat ke seluruh wilayah agar ketersediaan merata dan harga tetap terjangkau di pasar tradisional maupun modern.</p>`
    },
    {
        id: 3,
        kategori: "Teknologi",
        judul: "Penggunaan AI Semakin Meluas di Dunia Kerja",
        ringkasan: "Teknologi kecerdasan buatan membantu meningkatkan efisiensi dan produktivitas berbagai sektor.",
        gambar: "https://picsum.photos/id/1071/800/500",
        penulis: "Redaksi Teknologi",
        waktu: "25 Juni 2026 • 10.00 WIB",
        isi: `<p>JAKARTA – Penerapan kecerdasan buatan atau AI semakin banyak digunakan oleh perusahaan dan instansi pemerintah untuk mempermudah pekerjaan rutin.</p>
        <p>Menurut penelitian terbaru, teknologi ini mampu memangkas waktu pengerjaan tugas administrasi hingga 40% dan mengurangi tingkat kesalahan pengolahan data.</p>
        <p>Para ahli menegaskan bahwa AI berfungsi sebagai alat bantu, bukan menggantikan peran manusia sepenuhnya.</p>`
    },
    {
        id: 4,
        kategori: "Olahraga",
        judul: "Timnas Indonesia Siap Hadapi Laga Penting",
        ringkasan: "Skuad Garuda telah menyelesaikan pemusatan latihan dan memantapkan strategi untuk pertandingan mendatang.",
        gambar: "https://picsum.photos/id/1079/800/500",
        penulis: "Redaksi Olahraga",
        waktu: "25 Juni 2026 • 11.20 WIB",
        isi: `<p>JAKARTA – Tim Nasional Sepak Bola Indonesia dikabarkan dalam kondisi fisik dan mental yang prima jelang laga penting yang akan digelar akhir pekan ini.</p>
        <p>Pelatih kepala menyatakan seluruh pemain telah mengikuti sesi latihan dengan baik dan memahami taktik yang akan diterapkan.</p>
        <p>Dukungan penuh dari masyarakat diharapkan dapat memacu semangat tim untuk memberikan penampilan terbaik dan meraih hasil maksimal.</p>`
    },
    {
        id: 5,
        kategori: "Lingkungan",
        judul: "Program Penghijauan Nasional Diperluas",
        ringkasan: "Pemerintah menambah target penanaman pohon untuk menjaga keseimbangan ekosistem dan mengurangi pemanasan global.",
        gambar: "https://picsum.photos/id/1039/800/500",
        penulis: "Redaksi Lingkungan",
        waktu: "25 Juni 2026 • 13.00 WIB",
        isi: `<p>JAKARTA – Kementerian Lingkungan Hidup dan Kehutanan memperluas program penghijauan nasional dengan target penanaman 100 juta pohon dalam satu tahun ke depan.</p>
        <p>Penanaman akan dilakukan di lahan kritis, daerah resapan air, dan kawasan hutan lindung di seluruh provinsi.</p>
        <p>Program ini juga melibatkan partisipasi masyarakat, sekolah, dan perusahaan swasta agar terjaga keberlanjutannya.</p>`
    }
];

let indeksSekarang = 0;

// 🔄 FUNGSI UPDATE OTOMATIS SETIAP 1 MENIT
function tampilkanSemuaBerita() {
    // Ganti urutan berita secara otomatis
    const daftarTerurut = [
        daftarBerita[indeksSekarang % daftarBerita.length],
        daftarBerita[(indeksSekarang + 1) % daftarBerita.length],
        daftarBerita[(indeksSekarang + 2) % daftarBerita.length],
        daftarBerita[(indeksSekarang + 3) % daftarBerita.length],
        daftarBerita[(indeksSekarang + 4) % daftarBerita.length]
    ];

    // Tampilkan berita utama
    const utama = daftarTerurut[0];
    document.getElementById('beritaUtama').innerHTML = `
        <a href="#" onclick="bukaBerita(${utama.id})" class="block">
            <img src="${utama.gambar}" alt="${utama.judul}" class="w-full h-52 object-cover">
            <div class="p-4">
                <span class="text-sm text-voxy-red font-semibold">${utama.kategori} • ${utama.waktu}</span>
                <h3 class="text-xl font-bold my-2">${utama.judul}</h3>
                <p class="text-gray-600 line-clamp-2">${utama.ringkasan}</p>
            </div>
        </a>
    `;

    // Tampilkan daftar berita
    document.getElementById('daftarBerita').innerHTML = daftarTerurut.slice(1).map(b => `
        <a href="#" onclick="bukaBerita(${b.id})" class="flex gap-3 bg-white p-3 rounded shadow-sm mb-3">
            <img src="${b.gambar}" alt="${b.judul}" class="w-24 h-20 object-cover rounded">
            <div class="flex-1">
                <span class="text-xs text-voxy-red">${b.kategori}</span>
                <h4 class="font-semibold line-clamp-2 my-1">${b.judul}</h4>
                <p class="text-xs text-gray-500">${b.waktu}</p>
            </div>
        </a>
    `).join('');

    // Tampilkan berita berjalan
    document.getElementById('beritaJalan').textContent = daftarTerurut.map(b => `${b.judul} • `).join('');

    // Perbarui waktu
    document.getElementById('waktuSekarang').textContent = new Date().toLocaleTimeString('id-ID');
}

function bukaBerita(id) {
    const artikel = daftarBerita.find(x => x.id === id);
    document.getElementById('kontenDetail').innerHTML = `
        <span class="text-sm text-voxy-red font-semibold">${artikel.kategori}</span>
        <h1 class="text-2xl font-bold my-3">${artikel.judul}</h1>
        <p class="text-sm text-gray-500 mb-4">Oleh: ${artikel.penulis} • ${artikel.waktu}</p>
        <img src="${artikel.gambar}" alt="${artikel.judul}" class="w-full h-auto rounded mb-4">
        <div class="isi-berita">${artikel.isi}</div>
    `;
    tampilkan('detail');
}

function tampilkan(namaHalaman) {
    document.querySelectorAll(".halaman").forEach(el => el.classList.remove("aktif"));
    document.getElementById("halaman-" + namaHalaman).classList.add("aktif");
    window.scrollTo(0, 0);
}

// Jalankan sistem
tampilkanSemuaBerita();
setInterval(() => {
    indeksSekarang++;
    tampilkanSemuaBerita();
}, 60000); // Update otomatis setiap 1 menit
</script>

</body>
</html>
