<!DOCTYPE html>
<html lang="id-ID">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOXYZ NEWS - Berita Terbaru Otomatis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        voxy: { red: '#E62129', dark: '#111827', gray: '#F8FAFC' }
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .breaking-scroll { animation: scroll 25s linear infinite; white-space: nowrap; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
        .halaman { display: none; }
        .halaman.aktif { display: block; }
        .isi-berita p { margin: 1rem 0; line-height: 1.7; text-align: justify; }
    </style>
</head>
<body class="bg-voxy-gray text-gray-800">

<!-- Header -->
<header class="bg-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <a href="#" onclick="tampilkan('beranda')" class="text-2xl font-black text-voxy-red">VOXYZ<span class="text-gray-900">NEWS</span></a>
        <div class="text-sm text-gray-500">
            Update: <span id="waktuSekarang"></span>
        </div>
    </div>
    <div class="bg-voxy-red text-white py-2 overflow-hidden">
        <div class="container mx-auto flex items-center gap-2">
            <span class="bg-white text-voxy-red font-bold px-2 py-0.5 text-xs rounded">LIVE</span>
            <div id="beritaJalan" class="breaking-scroll text-sm">Memuat berita terbaru...</div>
        </div>
    </div>
</header>

<!-- Halaman Beranda -->
<div id="halaman-beranda" class="halaman aktif">
    <main class="container mx-auto px-4 py-5">
        <h2 class="text-xl font-bold border-l-4 border-voxy-red pl-3 mb-4">BERITA UTAMA</h2>
        <div id="beritaUtama" class="mb-8 bg-white rounded shadow-sm overflow-hidden"></div>

        <h2 class="text-xl font-bold border-l-4 border-voxy-red pl-3 mb-4">BERITA TERBARU</h2>
        <div id="daftarBerita" class="space-y-4"></div>
    </main>
</div>

<!-- Halaman Detail -->
<div id="halaman-detail" class="halaman">
    <main class="container mx-auto px-4 py-5 max-w-2xl">
        <div id="kontenDetail" class="bg-white p-5 rounded shadow-md"></div>
        <button onclick="tampilkan('beranda')" class="mt-5 text-voxy-red font-medium">← Kembali ke Beranda</button>
    </main>
</div>

<footer class="bg-gray-900 text-gray-300 text-center py-4 mt-6 text-sm">
    © 2026 VOXYZ NEWS • Berita otomatis dari ANTARA News
</footer>

<script>
let daftarBerita = [];

// ✅ Fungsi ambil BERITA TERBARU langsung dari internet
async function ambilBeritaTerbaru() {
    try {
        // Mengambil data dari sumber resmi
        const res = await fetch("https://api-berita-indonesia.vercel.app/antara/terbaru/");
        if (!res.ok) throw new Error("Tidak dapat terhubung");

        const data = await res.json();
        daftarBerita = data.data.posts.map((item, i) => ({
            id: i + 1,
            kategori: "Nasional",
            judul: item.title,
            ringkasan: item.description ? item.description.substring(0, 130) + "..." : "Baca selengkapnya",
            gambar: item.thumbnail || "https://picsum.photos/id/1065/800/500",
            waktu: new Date(item.pubDate).toLocaleString("id-ID", {
                day: "numeric", month: "long", year: "numeric", hour: "2-digit", minute: "2-digit"
            }),
            isi: `<p>${item.description || "Tidak ada keterangan tambahan."}</p>
                  <p class="mt-4 text-sm text-gray-500">Sumber: <a href="${item.link}" target="_blank" class="text-voxy-red font-medium">ANTARA News</a></p>`
        }));

        tampilkanKonten();
        document.getElementById("beritaJalan").textContent = daftarBerita.map(b => b.judul).join(" • ");
    } catch (err) {
        console.log("Gagal memuat:", err);
        document.getElementById("beritaJalan").textContent = "Sedang memuat ulang... Tunggu sebentar";
    }
}

function tampilkanKonten() {
    if (daftarBerita.length === 0) return;

    // Tampilkan berita utama
    const utama = daftarBerita[0];
    document.getElementById("beritaUtama").innerHTML = `
        <a href="#" onclick="bukaBerita(${utama.id})" class="block">
            <img src="${utama.gambar}" alt="${utama.judul}" class="w-full h-52 object-cover">
            <div class="p-4">
                <span class="text-sm text-voxy-red font-semibold">${utama.kategori} • ${utama.waktu}</span>
                <h3 class="text-xl font-bold my-2">${utama.judul}</h3>
                <p class="text-gray-600 line-clamp-2">${utama.ringkasan}</p>
            </div>
        </a>
    `;

    // Tampilkan daftar berita
    document.getElementById("daftarBerita").innerHTML = daftarBerita.slice(1, 8).map(b => `
        <a href="#" onclick="bukaBerita(${b.id})" class="flex gap-3 bg-white p-3 rounded shadow-sm mb-3">
            <img src="${b.gambar}" alt="${b.judul}" class="w-24 h-20 object-cover rounded">
            <div class="flex-1">
                <span class="text-xs text-voxy-red">${b.kategori}</span>
                <h4 class="font-semibold line-clamp-2 my-1">${b.judul}</h4>
                <p class="text-xs text-gray-500">${b.waktu}</p>
            </div>
        </a>
    `).join("");

    // Perbarui waktu
    document.getElementById("waktuSekarang").textContent = new Date().toLocaleTimeString("id-ID");
}

function bukaBerita(id) {
    const artikel = daftarBerita.find(x => x.id === id);
    document.getElementById("kontenDetail").innerHTML = `
        <span class="text-sm text-voxy-red font-semibold">${artikel.kategori}</span>
        <h1 class="text-2xl font-bold my-3">${artikel.judul}</h1>
        <p class="text-sm text-gray-500 mb-4">${artikel.waktu}</p>
        <img src="${artikel.gambar}" alt="${artikel.judul}" class="w-full h-auto rounded mb-4">
        <div class="isi-berita">${artikel.isi}</div>
    `;
    tampilkan("detail");
}

function tampilkan(namaHalaman) {
    document.querySelectorAll(".halaman").forEach(el => el.classList.remove("aktif"));
    document.getElementById("halaman-" + namaHalaman).classList.add("aktif");
    window.scrollTo(0, 0);
}

// Jalankan sistem otomatis
ambilBeritaTerbaru();
setInterval(ambilBeritaTerbaru, 60000); // Cek berita baru setiap 1 menit
</script>

</body>
</html>
