<html>
        <head><title>Downloaded HTML</title></head>
        <body>
            <pre style="white-space: pre-wrap; word-wrap: break-word;"><!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOXYZ NEWS - Breaking News Terkini</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .news-card:hover { transform: translateY(-4px); }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

  <nav class="bg-black border-b border-red-600 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <span class="text-4xl font-black tracking-tighter text-red-500">V</span>
        <h1 class="text-3xl font-bold tracking-tight">VOXYZ NEWS</h1>
      </div>
      <button onclick="loadNews()" class="bg-red-600 hover:bg-red-700 px-6 py-2 rounded-full flex items-center gap-2">
        <i class="fas fa-sync-alt"></i> Refresh
      </button>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-8">
    <h2 class="text-3xl font-bold mb-8">📰 Berita Terkini</h2>
    <div id="news-container" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
  </div>

  <script>
    const API_KEY = "876f89f0b3314f2aaf50f8c2e2f89741";

    async function loadNews() {
      const container = document.getElementById('news-container');
      container.innerHTML = '<p class="col-span-3 text-center py-12 text-zinc-400">Sedang memuat...</p>';

      try {
        const res = await fetch(`https://newsapi.org/v2/everything?q=Indonesia&sortBy=publishedAt&apiKey=${API_KEY}`);
        const data = await res.json();

        if (data.status === "ok" && data.articles && data.articles.length > 0) {
          container.innerHTML = '';
          data.articles.slice(0, 12).forEach(article => {
            const card = createCard(article);
            container.innerHTML += card;
          });
          return;
        }
      } catch (e) {
        console.log("API error, using dummy data");
      }

      // Dummy data jika API gagal
      container.innerHTML = '';
      const dummyNews = [
        {title: "Presiden Umumkan Program Subsidi Baru", desc: "Pemerintah akan meningkatkan subsidi listrik dan BBM mulai bulan depan.", url: "#", image: "https://picsum.photos/id/1015/600/400", time: "15 menit lalu"},
        {title: "Timnas Indonesia Menang Telak di AFF 2026", desc: "Skuad Garuda berhasil mengalahkan lawan dengan skor 4-1.", url: "#", image: "https://picsum.photos/id/201/600/400", time: "1 jam lalu"},
        {title: "Harga Emas Dunia Tembus Rekor Tertinggi", desc: "Harga emas hari ini mencapai Rp 1,5 juta per gram di pasar lokal.", url: "#", image: "https://picsum.photos/id/237/600/400", time: "3 jam lalu"},
        {title: "Apple Rilis iPhone 18 Series dengan AI Canggih", desc: "Fitur AI baru membuat performa semakin powerful.", url: "#", image: "https://picsum.photos/id/180/600/400", time: "5 jam lalu"}
      ];

      dummyNews.forEach(article => {
        const card = `
          <div onclick="window.open('${article.url}', '_blank')" class="news-card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer">
            <img src="${article.image}" class="w-full h-52 object-cover">
            <div class="p-6">
              <h3 class="font-bold text-xl leading-tight line-clamp-2">${article.title}</h3>
              <p class="text-zinc-400 text-sm mt-3 line-clamp-3">${article.desc}</p>
              <div class="text-xs text-zinc-500 mt-6">${article.time}</div>
            </div>
          </div>`;
        container.innerHTML += card;
      });
    }

    function createCard(article) {
      return `
        <div onclick="window.open('${article.url}', '_blank')" class="news-card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer">
          <img src="${article.urlToImage || 'https://picsum.photos/id/1015/600/400'}" class="w-full h-52 object-cover">
          <div class="p-6">
            <h3 class="font-bold text-xl leading-tight line-clamp-2">${article.title}</h3>
            <p class="text-zinc-400 text-sm mt-3 line-clamp-3">${article.description || 'Baca selengkapnya...'}</p>
            <div class="text-xs text-zinc-500 mt-6">${new Date(article.publishedAt).toLocaleDateString('id-ID')}</div>
          </div>
        </div>`;
    }

    window.onload = loadNews;
  </script>
</body>
</html></pre>
        </body>
    </html>
