<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voxyz News - Berita Realtime</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .hero-bg { background-image: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), url('https://picsum.photos/id/1015/1920/1080'); background-size: cover; background-position: center; }
    .news-card { transition: all 0.3s; }
    .news-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-gray-50">

  <!-- Navbar -->
  <nav class="bg-red-600 text-white sticky top-0 z-50 shadow">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fas fa-newspaper text-3xl"></i>
        <h1 class="text-2xl font-bold">VOXYZ NEWS</h1>
      </div>
      <div class="flex items-center gap-4">
        <input type="text" id="searchInput" class="px-4 py-2 rounded-full text-black w-52 focus:outline-none" placeholder="Cari berita...">
        <button onclick="searchNews()" class="bg-white text-red-600 px-5 py-2 rounded-full"><i class="fas fa-search"></i></button>
        <button onclick="loadRealtimeNews()" class="bg-white text-red-600 px-5 py-2 rounded-full"><i class="fas fa-sync"></i></button>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero-bg h-[60vh] flex items-center text-white">
    <div class="max-w-4xl mx-auto px-6 text-center">
      <h2 class="text-5xl font-bold leading-tight">Berita Realtime</h2>
      <p class="mt-4 text-xl">Update otomatis dari sumber berita dunia & Indonesia</p>
    </div>
  </section>

  <!-- Berita -->
  <section class="max-w-7xl mx-auto px-6 py-12">
    <div class="flex justify-between items-center mb-8">
      <h2 class="text-3xl font-bold flex items-center gap-3">
        <i class="fas fa-bolt text-red-600"></i> Berita Terbaru
      </h2>
      <button onclick="loadRealtimeNews()" class="text-red-600 hover:text-red-700 font-medium flex items-center gap-2">
        <i class="fas fa-sync"></i> Refresh
      </button>
    </div>

    <div id="newsContainer" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
      <!-- Berita muncul di sini -->
    </div>
  </section>

  <script>
    const API_KEY ="876f89f0b3314f2aaf50f8c2e2f89741"; // Ganti dengan API Key dari newsapi.org

    async function loadRealtimeNews() {
      const container = document.getElementById('newsContainer');
      container.innerHTML = '<p class="col-span-3 text-center py-10">Sedang memuat berita realtime...</p>';

      try {
        const response = await fetch(`https://newsapi.org/v2/top-headlines?country=id&apiKey=${API_KEY}`);
        const data = await response.json();

        if (data.status !== "ok") throw new Error("Gagal mengambil berita");

        container.innerHTML = '';
        data.articles.slice(0, 9).forEach(article => {
          const card = `
            <div class="news-card bg-white rounded-2xl overflow-hidden shadow">
              <img src="${article.urlToImage || 'https://picsum.photos/id/1015/600/400'}" class="w-full h-52 object-cover">
              <div class="p-6">
                <span class="inline-block bg-red-100 text-red-600 text-xs font-medium px-3 py-1 rounded-full">BERITA</span>
                <h3 class="font-semibold text-lg mt-4 leading-tight">${article.title}</h3>
                <p class="text-gray-600 mt-3 text-sm line-clamp-3">${article.description || 'Baca selengkapnya di sumber asli.'}</p>
                <div class="mt-6 flex justify-between items-center text-xs text-gray-500">
                  <span>${new Date(article.publishedAt).toLocaleDateString('id-ID')}</span>
                  <a href="${article.url}" target="_blank" class="text-red-600 hover:underline">Baca →</a>
                </div>
              </div>
            </div>
          `;
          container.innerHTML += card;
        });
      } catch (error) {
        container.innerHTML = `<p class="col-span-3 text-center py-10 text-red-500">Gagal memuat berita realtime.<br><small>Pastikan API Key sudah benar atau coba refresh.</small></p>`;
      }
    }

    function searchNews() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const cards = document.querySelectorAll('.news-card');
      cards.forEach(card => {
        const title = card.querySelector('h3').textContent.toLowerCase();
        card.style.display = title.includes(query) ? 'block' : 'none';
      });
    }

    // Load otomatis saat halaman dibuka
    window.onload = loadRealtimeNews;
  </script>

  <footer class="bg-gray-900 text-gray-400 py-8 text-center">
    <p>© 2026 Voxyz News • Berita realtime dengan NewsAPI</p>
  </footer>
</body>
</html>
