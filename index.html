<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOXYZ NEWS - Breaking News Terkini</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .news-card:hover { transform: translateY(-6px); transition: all 0.3s; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

  <nav class="bg-black border-b border-red-600 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <span class="text-4xl font-black tracking-tighter text-red-500">V</span>
        <h1 class="text-3xl font-bold tracking-tight">VOXYZ NEWS</h1>
      </div>
      <button onclick="loadNews()" class="bg-red-600 hover:bg-red-700 px-6 py-2 rounded-full flex items-center gap-2 text-sm">
        <i class="fas fa-sync-alt"></i> Refresh
      </button>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-8">
    <h2 class="text-3xl font-bold mb-8">📰 Berita Terkini</h2>
    <div id="news-container" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
  </div>

  <script>
    const API_KEY = "876f89f0b3314f2aaf50f8c2e2f89741";

    async function loadNews() {
      const container = document.getElementById('news-container');
      container.innerHTML = '<p class="col-span-3 text-center py-20 text-zinc-400">Sedang memuat berita...</p>';

      try {
        const res = await fetch(`https://newsapi.org/v2/everything?q=Indonesia&sortBy=publishedAt&language=id&apiKey=${API_KEY}`);
        const data = await res.json();
        if (data.status === "ok" && data.articles?.length > 0) {
          container.innerHTML = '';
          data.articles.slice(0, 12).forEach(article => {
            container.innerHTML += createCard(article);
          });
          return;
        }
      } catch (e) {}

      // Dummy Berita
      container.innerHTML = '';
      const dummy = [
        {title: "Presiden Umumkan Subsidi Listrik Naik 20%", desc: "Keputusan ini diambil untuk meringankan beban masyarakat.", time: "15 menit lalu"},
        {title: "Timnas Indonesia Lolos ke Final AFF 2026", desc: "Garuda berhasil mengalahkan Thailand dengan skor 3-1.", time: "1 jam lalu"},
        {title: "Harga Emas Hari Ini Tembus Rp 1,5 Juta", desc: "Nilai emas terus naik akibat ketidakstabilan global.", time: "3 jam lalu"}
      ];

      dummy.forEach(item => {
        container.innerHTML += `
          <div class="news-card bg-zinc-900 rounded-3xl p-6">
            <h3 class="font-bold text-xl">${item.title}</h3>
            <p class="text-zinc-400 text-sm mt-3">${item.desc}</p>
            <p class="text-xs text-zinc-500 mt-6">${item.time}</p>
          </div>`;
      });
    }

    function createCard(article) {
      return `<div onclick="window.open('${article.url}')" class="news-card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer p-6">
        <h3 class="font-bold">${article.title}</h3>
        <p class="text-sm text-zinc-400 mt-2">${article.description || ''}</p>
      </div>`;
    }

    window.onload = loadNews;
  </script>
</body>
  </html>
