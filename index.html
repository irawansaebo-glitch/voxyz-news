<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voxyz News - Berita Terkini</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .hero-bg {
      background-image: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), url('https://picsum.photos/id/1015/1920/1080');
      background-size: cover;
      background-position: center;
    }
    .news-card { transition: all 0.3s; }
    .news-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-gray-50">

  <!-- Navbar -->
  <nav class="bg-red-600 text-white sticky top-0 z-50 shadow">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fas fa-newspaper text-3xl"></i>
        <h1 class="text-2xl font-bold">VOXYZ NEWS</h1>
      </div>
      <div class="flex items-center gap-4">
        <input type="text" id="searchInput" 
               class="px-4 py-2 rounded-full text-black w-52 focus:outline-none" 
               placeholder="Cari berita...">
        <button onclick="searchNews()" class="bg-white text-red-600 px-5 py-2 rounded-full">
          <i class="fas fa-search"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero-bg h-[70vh] flex items-center text-white">
    <div class="max-w-4xl mx-auto px-6 text-center">
      <h2 class="text-5xl font-bold leading-tight">Berita Terpercaya & Up-to-Date</h2>
      <p class="mt-4 text-xl">Voxyz News - Selalu yang pertama</p>
    </div>
  </section>

  <!-- Berita Dinamis -->
  <section class="max-w-7xl mx-auto px-6 py-12">
    <h2 class="text-3xl font-bold mb-8 flex items-center gap-3">
      <i class="fas fa-bolt text-red-600"></i> Berita Terbaru
    </h2>

    <div id="newsContainer" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
      <!-- Berita muncul otomatis -->
    </div>
  </section>

  <script>
    async function loadNews() {
      try {
        const response = await fetch('news.json');
        const data = await response.json();
        const container = document.getElementById('newsContainer');
        container.innerHTML = '';

        data.news.forEach(item => {
          const card = `
            <div class="news-card bg-white rounded-2xl overflow-hidden shadow">
              <img src="${item.image}" class="w-full h-52 object-cover">
              <div class="p-6">
                <span class="inline-block bg-red-100 text-red-600 text-xs font-medium px-3 py-1 rounded-full">${item.category}</span>
                <h3 class="font-semibold text-lg mt-4 leading-tight">${item.title}</h3>
                <p class="text-gray-600 mt-3 text-sm line-clamp-3">${item.excerpt}</p>
                <div class="mt-6 flex justify-between items-center text-xs text-gray-500">
                  <span>${item.time}</span>
                  <span>${item.readTime}</span>
                </div>
              </div>
            </div>
          `;
          container.innerHTML += card;
        });
      } catch (error) {
        document.getElementById('newsContainer').innerHTML = `
          <p class="text-red-500 col-span-3 text-center py-10">Gagal memuat berita. Coba refresh halaman.</p>
        `;
      }
    }

    function searchNews() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const cards = document.querySelectorAll('.news-card');
      cards.forEach(card => {
        const title = card.querySelector('h3').textContent.toLowerCase();
        card.style.display = title.includes(query) ? 'block' : 'none';
      });
    }

    window.onload = loadNews;
  </script>

  <footer class="bg-gray-900 text-gray-400 py-8 text-center">
    <p>© 2026 Voxyz News • Semua hak dilindungi</p>
  </footer>
</body>
  </html>
